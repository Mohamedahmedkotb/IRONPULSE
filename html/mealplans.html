<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal plans — Ironpulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body data-shell="dashboard" data-page="meals" data-auth-required="true">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <div class="app-main-wrap">
        <header class="app-topbar">
          <button type="button" class="app-topbar__menu" id="sidebar-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
          <div id="app-navbar" class="ft-flex" style="flex: 1; min-width: 0"></div>
        </header>
        <main class="app-main ft-page-enter">
          <h1 class="ft-section-title" style="font-size: 1.75rem; margin-bottom: 8px">Meal plans</h1>
          <p class="ft-muted" style="margin-bottom: var(--space-6)">Targets, macros, and weekly structure.</p>
          <div class="meal-hero">
            <article class="ft-card ring-cal">
              <p class="ft-muted" style="margin-bottom: 8px">Daily target</p>
              <p class="big" id="meal-cal">3250</p>
              <p class="ft-muted">kcal Â· maintenance + training</p>
              <div style="margin-top: 16px">
                <label class="ft-label" for="cal-slider">Adjust</label>
                <input type="range" id="cal-slider" min="1800" max="4500" step="50" value="3250" style="width: 100%" />
              </div>
            </article>
            <article class="ft-card macro-bars">
              <h3 class="ft-section-title" style="font-size: 1rem; margin-bottom: var(--space-4)">Macro split</h3>
              <div class="row"><label><span>Protein</span><span id="p-pct">30%</span></label><div class="macro-bar"><span id="p-bar" style="width: 30%"></span></div></div>
              <div class="row"><label><span>Carbs</span><span id="c-pct">45%</span></label><div class="macro-bar"><span id="c-bar" style="width: 45%; background: linear-gradient(90deg,#22c55e,#16a34a)"></span></div></div>
              <div class="row"><label><span>Fats</span><span id="f-pct">25%</span></label><div class="macro-bar"><span id="f-bar" style="width: 25%; background: linear-gradient(90deg,#f59e0b,#d97706)"></span></div></div>
            </article>
            <article class="ft-card">
              <h3 class="ft-section-title" style="font-size: 1rem; margin-bottom: var(--space-4)">Hydration</h3>
              <p class="big" style="font-size: 2rem"><span id="water-l">2.4</span> L</p>
              <div class="ft-flex" style="margin-top: 12px">
                <button type="button" class="ft-btn ft-btn--secondary ft-btn--sm" id="water-minus">âˆ’</button>
                <button type="button" class="ft-btn ft-btn--primary ft-btn--sm" id="water-plus">+250ml</button>
              </div>
            </article>
          </div>
          <div class="ft-card">
            <h2 class="ft-section-title" style="margin-bottom: var(--space-4)">Weekly overview</h2>
            <div style="overflow-x: auto">
              <table class="meal-table">
                <thead><tr><th>Day</th><th>Breakfast</th><th>Lunch</th><th>Dinner</th><th>Cal</th></tr></thead>
                <tbody id="meal-rows"></tbody>
              </table>
            </div>
          </div>
        </main>
        <div id="app-footer"></div>
      </div>
    </div>
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/pages/mealplans.js"></script>
  </body>
</html>
