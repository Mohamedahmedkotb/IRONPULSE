<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI calculator Ś Ironpulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body data-shell="dashboard" data-page="bmi" data-auth-required="true">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <div class="app-main-wrap">
        <header class="app-topbar">
          <button type="button" class="app-topbar__menu" id="sidebar-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
          <div id="app-navbar" class="ft-flex" style="flex: 1; min-width: 0"></div>
        </header>
        <main class="app-main ft-page-enter">
          <h1 class="ft-section-title" style="font-size: 1.75rem; margin-bottom: 8px">BMI calculator</h1>
          <p class="ft-muted" style="margin-bottom: var(--space-6)">Estimate body mass index and see category guidance.</p>
          <div class="bmi-layout">
            <div class="ft-card">
              <h2 class="ft-section-title" style="font-size: 1.1rem; margin-bottom: var(--space-5)">Parameters</h2>
              <div style="margin-bottom: var(--space-4)">
                <span class="ft-label">Gender</span>
                <div class="bmi-toggle" role="group" aria-label="Gender">
                  <button type="button" class="is-active" data-g="f">Female</button>
                  <button type="button" data-g="m">Male</button>
                </div>
              </div>
              <div style="margin-bottom: var(--space-4)">
                <label class="ft-label" for="bmi-age">Age</label>
                <input class="ft-input" type="number" id="bmi-age" min="16" max="100" value="28" />
              </div>
              <div style="margin-bottom: var(--space-4)">
                <label class="ft-label" for="bmi-h">Height (cm): <span id="bmi-hv">175</span></label>
                <input class="ft-input" type="range" id="bmi-h" min="140" max="210" value="175" />
                <input class="ft-input" type="number" id="bmi-hn" value="175" style="margin-top: 8px" />
              </div>
              <div style="margin-bottom: var(--space-5)">
                <label class="ft-label" for="bmi-w">Weight (kg): <span id="bmi-wv">72</span></label>
                <input class="ft-input" type="range" id="bmi-w" min="40" max="160" value="72" />
                <input class="ft-input" type="number" id="bmi-wn" value="72" style="margin-top: 8px" />
              </div>
              <button type="button" class="ft-btn ft-btn--primary ft-btn--block ft-btn--lg" id="bmi-calc">Calculate BMI</button>
            </div>
            <div class="ft-card">
              <div class="bmi-gauge-wrap">
                <div class="bmi-gauge" aria-hidden="true">
                  <svg viewBox="0 0 220 120">
                    <path d="M 20 100 A 90 90 0 0 1 200 100" fill="none" stroke="#e2e8f0" stroke-width="14" stroke-linecap="round" />
                    <path id="bmi-arc" d="M 20 100 A 90 90 0 0 1 200 100" fill="none" stroke="url(#bmiGrad)" stroke-width="14" stroke-linecap="round" stroke-dasharray="0 400" />
                    <defs>
                      <linearGradient id="bmiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#22c55e" />
                        <stop offset="35%" stop-color="#3b82f6" />
                        <stop offset="70%" stop-color="#f59e0b" />
                        <stop offset="100%" stop-color="#ef4444" />
                      </linearGradient>
                    </defs>
                  </svg>
                </div>
                <div class="bmi-readout">
                  <div class="val" id="bmi-val">Ś</div>
                  <div class="cat" id="bmi-cat">Enter values</div>
                </div>
              </div>
              <div id="bmi-tips" class="ft-grid ft-grid-2" style="gap: 12px; margin-top: var(--space-4)"></div>
            </div>
          </div>
        </main>
        <div id="app-footer"></div>
      </div>
    </div>
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/pages/bmi.js"></script>
  </body>
</html>
