<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Routine builder — Ironpulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body data-shell="dashboard" data-page="routine" data-auth-required="true">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <div class="app-main-wrap">
        <header class="app-topbar">
          <button type="button" class="app-topbar__menu" id="sidebar-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
          <div id="app-navbar" class="ft-flex" style="flex: 1; min-width: 0"></div>
        </header>
        <main class="app-main ft-page-enter">
          <div class="ft-flex-between" style="margin-bottom: var(--space-5); flex-wrap: wrap; gap: 12px">
            <div>
              <h1 class="ft-section-title" style="font-size: 1.75rem">Routine builder</h1>
              <p class="ft-muted">Drag blocks, tune sets/reps, save to your library.</p>
            </div>
            <div class="ft-flex" style="gap: 10px">
              <a href="savedRoutine.html" class="ft-btn ft-btn--secondary">Saved routines</a>
              <button type="button" class="ft-btn ft-btn--primary" id="rb-save"><i class="fas fa-floppy-disk"></i> Save routine</button>
            </div>
          </div>
          <div class="rb-layout">
            <div>
              <div class="ft-card" style="margin-bottom: var(--space-4)">
                <label class="ft-label">Routine name</label>
                <input class="ft-input" id="rb-title" value="Upper A — Strength" />
                <label class="ft-label" style="margin-top: 12px">Description</label>
                <textarea class="ft-input" id="rb-desc" rows="2">Heavy compounds + accessories.</textarea>
              </div>
              <div id="rb-list"></div>
              <button type="button" class="ft-btn ft-btn--secondary ft-btn--block" id="rb-add-empty"><i class="fas fa-plus"></i> Add empty block</button>
            </div>
            <aside class="ft-card rb-side">
              <h3 class="ft-section-title" style="font-size: 1rem; margin-bottom: 12px">Exercise picker</h3>
              <input type="search" class="ft-input" id="rb-lib-q" placeholder="Filter…" style="margin-bottom: 12px" />
              <div class="rb-side-list" id="rb-lib"></div>
            </aside>
          </div>
        </main>
        <div id="app-footer"></div>
      </div>
    </div>
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/pages/routinebuilder.js"></script>
  </body>
</html>
