<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness tips Ś Ironpulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body data-shell="dashboard" data-page="tips" data-auth-required="true">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <div class="app-main-wrap">
        <header class="app-topbar">
          <button type="button" class="app-topbar__menu" id="sidebar-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
          <div id="app-navbar" class="ft-flex" style="flex: 1; min-width: 0"></div>
        </header>
        <main class="app-main ft-page-enter">
          <div class="ft-flex-between" style="margin-bottom: var(--space-5); flex-wrap: wrap; gap: 16px">
            <div>
              <h1 class="ft-section-title" style="font-size: 1.75rem">Fitness tips</h1>
              <p class="ft-muted">Curated guidance from coaches and sports science.</p>
            </div>
            <div class="ft-pills" id="tip-filters"></div>
          </div>
          <section class="tips-featured" id="tip-featured">
            <div class="bg" style="background-image: url(https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=1400&q=80)"></div>
            <div class="scrim"></div>
            <div class="content">
              <span class="ft-pill is-active" style="cursor: default; margin-bottom: 12px">Strength</span>
              <h2>The perfect deadlift setup</h2>
              <p>Bar path, breathing, and tension Ś three levers that instantly add kilos to the bar.</p>
              <button type="button" class="ft-btn ft-btn--primary ft-btn--sm" id="featured-read">Read article</button>
            </div>
          </section>
          <div class="card-grid" id="tip-grid"></div>
        </main>
        <div id="app-footer"></div>
      </div>
    </div>
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/pages/tips.js"></script>
  </body>
</html>
