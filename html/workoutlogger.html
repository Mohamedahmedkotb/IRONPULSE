<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Logger - IRONPULSE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/workoutlogger.css">
</head>
<body>
    <header class="workout-header">
        <button class="cancel-btn">
            <i class="fa-solid fa-xmark"></i> Cancel Workout
        </button>
        <h1 class="workout-title">Upper Body Power</h1>
        <button class="save-btn">Save Draft</button>
    </header>

    <main class="workout-container">
        <!-- Top Dashboard Section -->
        <div class="top-dashboard">
            <!-- Progress Card -->
            <div class="progress-card fade-in-up">
                <div class="progress-ring-container">
                    <svg class="progress-ring" width="160" height="160">
                        <circle class="progress-ring__circle-bg" stroke="#e2e8f0" stroke-width="12" fill="transparent" r="70" cx="80" cy="80"/>
                        <circle class="progress-ring__circle" stroke="#3b82f6" stroke-width="12" fill="transparent" r="70" cx="80" cy="80"/>
                    </svg>
                    <div class="time-display">
                        <span class="time" id="elapsed-time"></span>
                        <span class="label">ELAPSED</span>
                    </div>
                </div>
                <div class="progress-info">
                    <h2>Workout in Progress</h2>
                    <p>Keep pushing. You're tracking ahead of your last session.</p>
                    <div class="controls">
                        <button class="control-btn pause-btn" id="pause-btn">
                            <i class="fa-solid fa-pause"></i>
                        </button>
                        <button class="control-btn add-btn">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stats Sidebar -->
            <div class="stats-sidebar">
                <div class="stat-card fade-in-up delay-1">
                    <div class="stat-header">
                        <span class="stat-title">ACTIVE CALORIES</span>
                        <i class="fa-solid fa-fire text-orange"></i>
                    </div>
                    <div class="stat-value">
                        <span class="number text-orange">342</span>
                        <span class="unit">kcal</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar orange-bar"></div>
                    </div>
                </div>

                <div class="stat-card fade-in-up delay-2">
                    <div class="stat-header">
                        <span class="stat-title">AVG HEART RATE</span>
                        <i class="fa-solid fa-heart text-blue"></i>
                    </div>
                    <div class="stat-value">
                        <span class="number">128</span>
                        <span class="unit">bpm</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Exercise Log Card -->
        <div class="exercise-log-card fade-in-up delay-3">
            <div class="log-header">
                <div>
                    <h2>Exercise Log</h2>
                    <p class="subtitle">3 exercises completed &bull; 2 remaining</p>
                </div>
                <button class="add-exercise-btn" >

                    <i class="fa-solid fa-plus"> <a href="./Exerciselibrary.html"> </i> Add Exercise
                </button>
            </div>

            <div class="table-responsive">
                <table class="exercise-table">
                    <thead>
                        <tr>
                            <th>SET</th>
                            <th>EXERCISE</th>
                            <th>WEIGHT (LBS)</th>
                            <th>REPS</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="exercise-list">
                        <!-- Rows populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Finish Button -->
        <div class="finish-container fade-in-up delay-4">
            <button class="finish-workout-btn">Finish Workout</button>
        </div>
    </main>

    <script src="../js/workoutlogger.js"></script>
</body>
</html>
