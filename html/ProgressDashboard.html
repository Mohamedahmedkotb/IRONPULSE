<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress — Ironpulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body data-shell="dashboard" data-page="progress" data-auth-required="true">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <div class="app-main-wrap">
        <header class="app-topbar">
          <button type="button" class="app-topbar__menu" id="sidebar-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
          <div id="app-navbar" class="ft-flex" style="flex: 1; min-width: 0"></div>
        </header>
        <main class="app-main ft-page-enter">
          <div class="ft-flex-between" style="margin-bottom: var(--space-5)">
            <div>
              <h1 class="ft-section-title" style="font-size: 1.75rem">Progress</h1>
              <p class="ft-muted">Volume, consistency, and personal bests.</p>
            </div>
            <div class="ft-pills progress-filters" id="progress-range">
              <button type="button" class="ft-pill is-active" data-range="week">Weekly</button>
              <button type="button" class="ft-pill" data-range="month">Monthly</button>
            </div>
          </div>
          <div class="metric-row">
            <article class="ft-card"><div class="stat-card-mini"><h3>Max bench</h3><p class="value" id="m-bench">225 lbs</p></div></article>
            <article class="ft-card"><div class="stat-card-mini"><h3>Streak</h3><p class="value" id="m-streak">14 days</p></div></article>
            <article class="ft-card"><div class="stat-card-mini"><h3>Total reps</h3><p class="value" id="m-reps">8.4k</p></div></article>
          </div>
          <div class="chart-row">
            <div class="ft-card">
              <div class="ft-flex-between" style="margin-bottom: var(--space-4)"><strong>Volume over time</strong><span class="ft-muted" id="vol-label">This week</span></div>
              <canvas id="chart-vol" width="600" height="220" aria-label="Volume line chart"></canvas>
            </div>
            <div class="ft-card">
              <div class="ft-flex-between" style="margin-bottom: var(--space-4)"><strong>Weekly distribution</strong><span class="ft-muted">Sessions</span></div>
              <canvas id="chart-bar" width="600" height="220" aria-label="Weekly bar chart"></canvas>
            </div>
          </div>
          <div class="ft-card" style="margin-top: var(--space-5)">
            <h2 class="ft-section-title" style="margin-bottom: var(--space-4)">Recent PBs</h2>
            <ul class="activity-list" id="pb-list"></ul>
          </div>
        </main>
        <div id="app-footer"></div>
      </div>
    </div>
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/pages/progress.js"></script>
  </body>
</html>
