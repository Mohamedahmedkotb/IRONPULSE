<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise library — Ironpulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body data-shell="dashboard" data-page="library" data-auth-required="true">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <div class="app-main-wrap">
        <header class="app-topbar">
          <button type="button" class="app-topbar__menu" id="sidebar-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
          <div id="app-navbar" class="ft-flex" style="flex: 1; min-width: 0"></div>
        </header>
        <main class="app-main ft-page-enter">
          <div class="ft-flex-between" style="margin-bottom: var(--space-5); flex-wrap: wrap; gap: 16px">
            <div>
              <h1 class="ft-section-title" style="font-size: 1.75rem">Exercise library</h1>
              <p class="ft-muted">Search, filter, and preview movement patterns.</p>
            </div>
            <button type="button" class="ft-btn ft-btn--primary" id="lib-add-custom"><i class="fas fa-plus"></i> Custom exercise</button>
          </div>
          <div class="ft-card" style="margin-bottom: var(--space-5)">
            <div class="ft-flex" style="flex-wrap: wrap; gap: 12px; align-items: center">
              <div class="ft-input-wrap" style="flex: 1; min-width: 220px">
                <i class="fas fa-search"></i>
                <input type="search" class="ft-input" id="lib-search" placeholder="Search exercises…" />
              </div>
              <div class="ft-pills" id="lib-cats"></div>
            </div>
          </div>
          <div class="card-grid" id="lib-grid"></div>
        </main>
        <div id="app-footer"></div>
      </div>
    </div>
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/pages/library.js"></script>
  </body>
</html>
