<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronPulse - Login</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>

    <div class="auth-container">
        <!-- Left Side: Image/Brand -->
        <div class="auth-brand">
            <div class="auth-brand-content">
                <div class="brand-logo">PERFORMANCE</div>
                <h1>Welcome Back.</h1>
                <p>Precision metrics for elite performance. Continue your kinetic journey.</p>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="auth-form-wrapper">
            <div class="auth-form-container card">
                <h2>Log in to your account</h2>
                <p class="auth-subtitle">Enter your details to access your dashboard.</p>

                <form action="../php/login.php" method="POST" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="athlete@ironpulse.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label for="password">Password</label>
                            <a href="#" class="forgot-link">Forgot password?</a>
                        </div>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me for 30 days</label>
                    </div>

                    <button type="submit" class="btn-primary auth-btn">
                        Log in <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="auth-divider">
                    <span>OR CONTINUE WITH</span>
                </div>

                <div class="social-login">
                    <button type="button" class="btn-social">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
                        Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fab fa-apple"></i>
                        Apple
                    </button>
                </div>

                <p class="auth-footer-text">
                    Don't have an account? <a href="signup.html">Create an account</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
