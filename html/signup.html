<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="stylesheet" href="../styles/signup.css" />
  </head>
  <body>
    <div class="main">
      <div class="picture">
        <p>
          Movement is fluid.
          <br />
          Data is exact.
          <span class="colour"></span>
        </p>
      </div>
      <div class="form">
        <div class="text">
          <div class="text1">Welcome, Start Your Journey</div>
          <div class="text12">
            Join 10,000+ athletes tracking their performance
          </div>
        </div>
        <form action="../php/signup.php" method="POST">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your full name"
            required
          />
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />
          <label for="pass">Password</label>
          <input
            type="password"
            id="pass"
            name="password"
            placeholder="Create a password"
            required
          />
          <label for="confirm">Confirm Password</label>
          <input
            type="password"
            id="confirm"
            name="confirm_password"
            placeholder="Repeat your password"
            required
          />
          <button class="prim-btn" type="submit">Create Account</button>
          <div class="divider">
            <span>OR CONTINUE WITH</span>
          </div>
          <div class="social-buttons">
            <button class="social-btn" type="button">
              <a href="">Google</a>
            </button>
            <button class="social-btn" type="button">
              <a href="">Apple</a>
            </button>
          </div>
          <p class="footer-text">Already an athlete? <a href="./login.html">Login</a></p>
        </form>
      </div>
    </div>
    <script src="../js/signup.js"></script>
  </body>
</html>
