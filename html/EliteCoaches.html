<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite coaches — Ironpulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body data-shell="dashboard" data-page="coaches" data-auth-required="true">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <div class="app-main-wrap">
        <header class="app-topbar">
          <button type="button" class="app-topbar__menu" id="sidebar-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
          <div id="app-navbar" class="ft-flex" style="flex: 1; min-width: 0"></div>
        </header>
        <main class="app-main ft-page-enter">
          <section class="coach-banner">
            <h1>Elite coaches. Elite results.</h1>
            <p>Connect with trainers matched to your performance goals.</p>
            <div class="coach-search">
              <i class="fas fa-search"></i>
              <input type="search" id="coach-q" placeholder="Search by name or specialty…" aria-label="Search coaches" />
            </div>
          </section>
          <div class="ft-pills" style="margin-bottom: var(--space-5)" id="coach-filters"></div>
          <div class="card-grid" id="coach-grid"></div>
        </main>
        <div id="app-footer"></div>
      </div>
    </div>
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/pages/coaches.js"></script>
  </body>
</html>
