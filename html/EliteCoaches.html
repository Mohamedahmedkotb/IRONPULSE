<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EliteCoaches</title>
<link href="../styles/EliteCoaches.css" rel="stylesheet"/>
<link href="../styles/sidebar.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../styles/global.css" rel="stylesheet"/></head>
<body>
<div class="app-container">
<app-sidebar></app-sidebar>
<main class="main-content">
<div class="hero">
<div class="container">
<h1>Elite Coaches. Elite Results.</h1>
<p>Connect with top-tier trainers customized to your <br/>performance goals.</p>
</div>
</div>
<div class="container">
<div class="search-filter">
<div class="search-box">
<input placeholder="Search trainers by name or specialty..." type="text"/>
</div>
<div class="filters">
<button class="active">All Specialties</button>
<button>Strength</button>
<button>Endurance</button>
<button>Mobility</button>
</div>
</div>
<div class="cards">
<div class="card">
<div class="image-wrapper">
<img alt="trainer" src="../assets/media/27fe2dde-6b22-4baf-ae55-0fefac541008.jpeg"/>
<div class="rating">⭐ 4.9</div>
</div>
<div class="card-content">
<h3>Sarah Jenkins</h3>
<p>Strength &amp; Conditioning</p>
<div class="tags">
<span>Olympic Lifting</span>
<span>Hypertrophy</span>
</div>
<div class="card-footer">
<div class="price">$85/hr</div>
<button class="btn">View Profile</button>
</div>
</div>
</div>
<div class="card">
<div class="image-wrapper">
<img alt="trainer" src="../assets/media/03568370-b589-469b-9cc2-71ccf09ffe8f.jpeg"/>
<div class="rating">⭐ 5.0</div>
</div>
<div class="card-content">
<h3>Marcus Chen</h3>
<p>Functional Mobility Specialist</p>
<div class="tags">
<span>Mobility</span>
<span>Injury Rehab</span>
</div>
<div class="card-footer">
<div class="price">$95/hr</div>
<button class="btn">View Profile</button>
</div>
</div>
</div>
</div>
</div>
</main>
</div>
<script src="../js/sidebar.js"></script>
</body>
</html>
